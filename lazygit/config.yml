# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  border: rounded
  nerdFontsVersion: "3"
  showRandomTip: false
  showCommandLog: false
  showFileTree: true
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - default
    selectedLineBgColor:
      - blue
    optionsTextColor:
      - blue

git:
  diffContextSize: 999999
  mainBranches:
    - master
    - main
  log:
    order: topo-order
    showGraph: always

os:
  editPreset: vim

disableStartupPopups: true
notARepository: prompt
promptToReturnFromSubprocess: true
